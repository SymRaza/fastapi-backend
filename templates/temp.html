<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Management System | Login</title>
    <style>
        :root {
            --primary-bg: #000031;
            --card-bg: #ffffff;
            --accent-blue: #2a2a72;
            --text-main: #333333;
            --input-border: #cccccc;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--primary-bg);
            display: flex; /* Centers the card vertically and horizontally */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #welcome-message h1 {
            color: #f0efff;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        #title h1 {
            text-align: center;
            color: var(--text-main);
            letter-spacing: 2px;
            margin: 0 0 30px 0;
            text-transform: uppercase;
        }

        #main-container {
            background-color: var(--card-bg);
            width: 350px;
            padding: 40px;
            border-radius: 12px;
        }

        h2 {
            font-size: 14px;
            color: var(--text-main);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--input-border);
            border-radius: 6px;
            box-sizing: border-box; /* Prevents input from overflowing container */
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 5px rgba(42, 42, 114, 0.2);
        }

        #submit-button {
            width: 100%;
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease; /* Smooth hover effect */
        }

        #submit-button:hover {
            background-color: #1a1a52;
        }
    </style>
</head>
<body>

    <div id="welcome-message">
        <h1>CAMPUS PORTAL LOGIN</h1>
    </div>

    <div id="main-container">
        <div id="title">
            <h1>
                Login
            </h1>
        </div>
        <form action="/submit-item" method="post">
            <h2>Full Name</h2>
            <input type="text" name="my_name" placeholder="e.g. Sayem Raza" required>

            <h2>Age</h2>
            <input type="number" name="my_age" placeholder="Age" required>

            <button type="submit" id="submit-button">Sign In</button>
        </form>
    </div>

</body>
</html>
